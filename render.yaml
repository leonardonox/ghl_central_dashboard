services:
  - type: web
    name: ghl-central-dashboard
    env: python
    rootDir: ghl_central_dashboard
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENVIRONMENT
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: ghl-central-dashboard-db
          property: connectionString
      - key: SYNC_INTERVAL_MINUTES
        value: 30

databases:
  - name: ghl-central-dashboard-db
    databaseName: ghl_dashboard
    user: ghl_dashboard_user
